name: One-time Production Admin Bootstrap

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type CREATE ADMIN to authorize the production bootstrap
        required: true
        type: string

permissions:
  contents: read

jobs:
  bootstrap:
    name: Create and verify production administrator
    if: inputs.confirmation == 'CREATE ADMIN'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - name: Bootstrap administrator over SSH
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f # v1.2.2
        env:
          APP_DIR: ${{ secrets.PRODUCTION_APP_DIR || '/var/www/project' }}
          ADMIN_EMAIL: sportstathub@gmail.com
          ADMIN_USERNAME: sportstathub
          ADMIN_PASSWORD: ${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
          username: ${{ secrets.PRODUCTION_USER }}
          password: ${{ secrets.PRODUCTION_PASSWORD }}
          fingerprint: ${{ secrets.PRODUCTION_HOST_FINGERPRINT }}
          command_timeout: 5m
          envs: APP_DIR,ADMIN_EMAIL,ADMIN_USERNAME,ADMIN_PASSWORD
          script: |
            set -euo pipefail
            cd "$APP_DIR"
            if [ -z "${ADMIN_PASSWORD:-}" ] || [ "${#ADMIN_PASSWORD}" -lt 12 ]; then
              echo "ERROR: BOOTSTRAP_ADMIN_PASSWORD is missing or too short." >&2
              exit 1
            fi

            BACKEND_CONTAINER="$(docker compose -f docker-compose.prod.yml ps -q backend)"
            DB_CONTAINER="$(docker compose -f docker-compose.prod.yml ps -q db)"
            if [ -z "$BACKEND_CONTAINER" ] || [ -z "$DB_CONTAINER" ]; then
              echo "ERROR: backend or database container is not running." >&2
              exit 1
            fi

            docker exec \
              -e BOOTSTRAP_ADMIN_EMAIL="$ADMIN_EMAIL" \
              -e BOOTSTRAP_ADMIN_USERNAME="$ADMIN_USERNAME" \
              -e BOOTSTRAP_ADMIN_PASSWORD="$ADMIN_PASSWORD" \
              "$BACKEND_CONTAINER" \
              node --input-type=module -e '
                import pg from "pg";
                import bcrypt from "bcrypt";
                const email = process.env.BOOTSTRAP_ADMIN_EMAIL.trim().toLowerCase();
                const username = process.env.BOOTSTRAP_ADMIN_USERNAME.trim().toLowerCase();
                const password = process.env.BOOTSTRAP_ADMIN_PASSWORD;
                const pool = new pg.Pool({ connectionString: process.env.DATABASE_URL });
                try {
                  const hash = await bcrypt.hash(password, 10);
                  await pool.query(
                    `INSERT INTO users (username, email, password, role, is_verified, mfa_required)
                     VALUES ($1, $2, $3, $4, TRUE, TRUE)
                     ON CONFLICT DO NOTHING`,
                    [username, email, hash, "admin"]
                  );
                  const { rows } = await pool.query(
                    `SELECT email, username, role, is_verified, mfa_required
                       FROM users WHERE email = $1`,
                    [email]
                  );
                  const admin = rows[0];
                  if (!admin || admin.role !== "admin" || !admin.is_verified || !admin.mfa_required) {
                    throw new Error("administrator verification failed");
                  }
                  console.log(`Administrator verified: ${admin.email} (${admin.username}); MFA enrollment required.`);
                } finally {
                  await pool.end();
                }
              '

            ADMIN_COUNT="$(docker exec "$DB_CONTAINER" psql -U project -d me -Atc "SELECT count(*) FROM users WHERE role = 'admin' AND email = 'sportstathub@gmail.com'")"
            test "$ADMIN_COUNT" = "1"
            docker exec "$BACKEND_CONTAINER" node -e "fetch('http://127.0.0.1:4000/health/ready').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
