name: Migrate server .env to GitHub Secrets

# One-time migration workflow. After it succeeds:
#   1. Delete SECRETS_WRITER_PAT from GitHub Secrets
#   2. Delete this workflow file (or keep it disabled — it only fires on workflow_dispatch)
on:
  workflow_dispatch:
    inputs:
      env_path:
        description: "Absolute path to .env on the production server"
        required: false
        default: "/var/www/project/.env"

jobs:
  migrate:
    name: Copy server .env → GitHub Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Read .env from production server
        run: |
          mkdir -p ~/.ssh
          sudo apt-get install -y -qq sshpass

          # Try key auth first, but always have password auth as a fallback —
          # PRODUCTION_SSH_KEY has proven unparsable by every SSH client tried
          # here (native ssh, drone-ssh), while PRODUCTION_PASSWORD is known-good
          # (the production.yml deploy job's appleboy/ssh-action falls back to it
          # automatically and succeeds). Mirror that resilience here explicitly.
          fetched=false
          if [ -n "${SSH_KEY:-}" ]; then
            python3 - << 'PYEOF'
          import os, stat
          key = os.environ["SSH_KEY"].replace("\r\n", "\n").replace("\r", "\n")
          if not key.endswith("\n"):
              key += "\n"
          p = os.path.expanduser("~/.ssh/deploy_key")
          with open(p, "w", newline="") as f:
              f.write(key)
          os.chmod(p, stat.S_IRUSR | stat.S_IWUSR)
          PYEOF
            if ssh -i ~/.ssh/deploy_key \
                 -o StrictHostKeyChecking=no \
                 -o BatchMode=yes \
                 "${SSH_USER}@${SSH_HOST}" \
                 "cat '${{ inputs.env_path }}'" > prod.env; then
              fetched=true
            else
              echo "Key auth failed — falling back to password auth." >&2
            fi
          fi

          if [ "$fetched" != "true" ]; then
            sshpass -p "${SSH_PASS}" ssh \
              -o StrictHostKeyChecking=no \
              "${SSH_USER}@${SSH_HOST}" \
              "cat '${{ inputs.env_path }}'" > prod.env
          fi

          echo "Read $(grep -c '=' prod.env || echo 0) variable(s) from ${{ inputs.env_path }}"
        env:
          SSH_KEY:  ${{ secrets.PRODUCTION_SSH_KEY }}
          SSH_PASS: ${{ secrets.PRODUCTION_PASSWORD }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}

      - name: Push every variable to GitHub Secrets
        run: |
          pip install -q PyNaCl requests
          python3 << 'PYEOF'
          import os, re, base64, sys, requests
          from nacl import encoding, public

          REPO    = os.environ["GITHUB_REPOSITORY"]
          TOKEN   = os.environ["SECRETS_WRITER_PAT"]
          headers = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          # Fetch the repo's public key (needed to encrypt each secret)
          r = requests.get(
              f"https://api.github.com/repos/{REPO}/actions/secrets/public-key",
              headers=headers,
              timeout=10,
          )
          r.raise_for_status()
          key_meta   = r.json()
          pub_key_id = key_meta["key_id"]
          pub_key_b64 = key_meta["key"]

          def encrypt(pub_b64: str, plaintext: str) -> str:
              pk  = public.PublicKey(pub_b64.encode(), encoding.Base64Encoder())
              box = public.SealedBox(pk)
              return base64.b64encode(box.encrypt(plaintext.encode())).decode()

          ok = fail = 0
          with open("prod.env") as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith("#") or "=" not in line:
                      continue
                  key, _, value = line.partition("=")
                  key = key.strip()
                  if not re.match(r"^[A-Za-z_][A-Za-z0-9_]*$", key):
                      continue
                  resp = requests.put(
                      f"https://api.github.com/repos/{REPO}/actions/secrets/{key}",
                      headers=headers,
                      json={"encrypted_value": encrypt(pub_key_b64, value), "key_id": pub_key_id},
                      timeout=10,
                  )
                  if resp.status_code in (201, 204):
                      print(f"  ✓  {key}")
                      ok += 1
                  else:
                      print(f"  ✗  {key}  ({resp.status_code}: {resp.text[:80]})", file=sys.stderr)
                      fail += 1

          print(f"\n{ok} secret(s) set", end="")
          if fail:
              print(f", {fail} failed — check token permissions (needs 'Repository secrets: write')")
              sys.exit(1)
          else:
              print(" — all good.")
          PYEOF
        env:
          SECRETS_WRITER_PAT: ${{ secrets.SECRETS_WRITER_PAT }}

      - name: Clean up sensitive files
        if: always()
        run: rm -f ~/.ssh/deploy_key prod.env
