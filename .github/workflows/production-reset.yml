name: One-time Production Data Reset

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type RESET PRODUCTION to authorize the destructive reset
        required: true
        type: string

permissions:
  contents: read

jobs:
  reset:
    name: Backup, reset, and bootstrap production
    if: inputs.confirmation == 'RESET PRODUCTION'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - name: Reset production data over SSH
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f # v1.2.2
        env:
          APP_DIR: ${{ secrets.PRODUCTION_APP_DIR || '/var/www/project' }}
          APP_REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          ADMIN_EMAIL: sportstathub@gmail.com
          ADMIN_USERNAME: sportstathub
          ADMIN_PASSWORD: ${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
          username: ${{ secrets.PRODUCTION_USER }}
          password: ${{ secrets.PRODUCTION_PASSWORD }}
          fingerprint: ${{ secrets.PRODUCTION_HOST_FINGERPRINT }}
          command_timeout: 20m
          envs: APP_DIR,APP_REDIS_PASSWORD,ADMIN_EMAIL,ADMIN_USERNAME,ADMIN_PASSWORD
          script: |
            set -euo pipefail
            umask 077

            if [ -z "${ADMIN_PASSWORD:-}" ] || [ "${#ADMIN_PASSWORD}" -lt 12 ]; then
              echo "ERROR: BOOTSTRAP_ADMIN_PASSWORD is missing or too short." >&2
              exit 1
            fi
            cd "$APP_DIR"
            test -f docker-compose.prod.yml

            DB_CONTAINER="$(docker compose -f docker-compose.prod.yml ps -q db)"
            REDIS_CONTAINER="$(docker compose -f docker-compose.prod.yml ps -q redis)"
            BACKEND_CONTAINER="$(docker compose -f docker-compose.prod.yml ps -aq backend)"
            FRONTEND_CONTAINER="$(docker compose -f docker-compose.prod.yml ps -aq frontend)"
            ODDS_API_CONTAINER="$(docker compose -f docker-compose.prod.yml ps -aq oddswitch-api)"
            ODDS_WORKER_CONTAINER="$(docker compose -f docker-compose.prod.yml ps -aq oddswitch-worker)"
            ODDS_BROWSER_CONTAINER="$(docker compose -f docker-compose.prod.yml ps -aq oddswitch-browser-worker)"

            for required in "$DB_CONTAINER" "$REDIS_CONTAINER" "$BACKEND_CONTAINER" "$FRONTEND_CONTAINER" "$ODDS_API_CONTAINER" "$ODDS_WORKER_CONTAINER" "$ODDS_BROWSER_CONTAINER"; do
              if [ -z "$required" ]; then
                echo "ERROR: a required production container is missing; refusing to reset." >&2
                exit 1
              fi
            done

            TIMESTAMP="$(date -u +%Y%m%dT%H%M%SZ)"
            BACKUP_DIR="/var/backups/sportstathub/$TIMESTAMP"
            mkdir -p "$BACKUP_DIR"
            chmod 700 "$BACKUP_DIR"

            echo "Creating production backup at $BACKUP_DIR"
            docker exec "$DB_CONTAINER" pg_dump -U project -Fc me > "$BACKUP_DIR/me.dump"
            docker exec "$DB_CONTAINER" pg_dump -U project -Fc oddswitch > "$BACKUP_DIR/oddswitch.dump"
            docker exec "$REDIS_CONTAINER" redis-cli --no-auth-warning -a "$APP_REDIS_PASSWORD" SAVE >/dev/null
            docker cp "$REDIS_CONTAINER:/data/dump.rdb" "$BACKUP_DIR/redis-dump.rdb" >/dev/null

            test -s "$BACKUP_DIR/me.dump"
            test -s "$BACKUP_DIR/oddswitch.dump"
            test -s "$BACKUP_DIR/redis-dump.rdb"
            docker exec -i "$DB_CONTAINER" pg_restore -l < "$BACKUP_DIR/me.dump" >/dev/null
            docker exec -i "$DB_CONTAINER" pg_restore -l < "$BACKUP_DIR/oddswitch.dump" >/dev/null
            (cd "$BACKUP_DIR" && sha256sum me.dump oddswitch.dump redis-dump.rdb > SHA256SUMS)
            printf 'Backup validated: %s\n' "$BACKUP_DIR"

            docker stop "$FRONTEND_CONTAINER" "$BACKEND_CONTAINER" "$ODDS_WORKER_CONTAINER" "$ODDS_BROWSER_CONTAINER" "$ODDS_API_CONTAINER" >/dev/null

            docker exec "$DB_CONTAINER" dropdb --force --if-exists -U project me
            docker exec "$DB_CONTAINER" createdb -U project -O project me
            docker exec "$DB_CONTAINER" dropdb --force --if-exists -U project oddswitch
            docker exec "$DB_CONTAINER" createdb -U project -O project oddswitch
            docker exec "$REDIS_CONTAINER" redis-cli --no-auth-warning -a "$APP_REDIS_PASSWORD" FLUSHALL >/dev/null

            wait_for_container() {
              container_id="$1"
              label="$2"
              for attempt in $(seq 1 90); do
                state="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")"
                if [ "$state" = "healthy" ] || [ "$state" = "running" ]; then
                  return 0
                fi
                if [ "$state" = "unhealthy" ] || [ "$state" = "exited" ] || [ "$state" = "dead" ]; then
                  break
                fi
                sleep 2
              done
              echo "ERROR: $label failed to become healthy." >&2
              docker logs --tail=160 "$container_id"
              return 1
            }

            docker start "$ODDS_API_CONTAINER" >/dev/null
            wait_for_container "$ODDS_API_CONTAINER" oddswitch-api

            docker start "$BACKEND_CONTAINER" >/dev/null
            wait_for_container "$BACKEND_CONTAINER" backend

            docker start "$ODDS_WORKER_CONTAINER" "$ODDS_BROWSER_CONTAINER" "$FRONTEND_CONTAINER" >/dev/null
            wait_for_container "$ODDS_WORKER_CONTAINER" oddswitch-worker
            wait_for_container "$ODDS_BROWSER_CONTAINER" oddswitch-browser-worker
            wait_for_container "$FRONTEND_CONTAINER" frontend

            docker exec \
              -e BOOTSTRAP_ADMIN_EMAIL="$ADMIN_EMAIL" \
              -e BOOTSTRAP_ADMIN_USERNAME="$ADMIN_USERNAME" \
              -e BOOTSTRAP_ADMIN_PASSWORD="$ADMIN_PASSWORD" \
              "$BACKEND_CONTAINER" \
              sh -c 'node dist/seed-admin.js "$BOOTSTRAP_ADMIN_EMAIL" "$BOOTSTRAP_ADMIN_PASSWORD" "$BOOTSTRAP_ADMIN_USERNAME"'

            ADMIN_COUNT="$(docker exec "$DB_CONTAINER" psql -U project -d me -Atc "SELECT count(*) FROM users WHERE role = 'admin' AND email = 'sportstathub@gmail.com'")"
            if [ "$ADMIN_COUNT" != "1" ]; then
              echo "ERROR: new administrator verification failed." >&2
              exit 1
            fi

            docker exec "$BACKEND_CONTAINER" node -e "fetch('http://127.0.0.1:4000/health/ready').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
            docker exec "$FRONTEND_CONTAINER" node -e "fetch('http://127.0.0.1:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
            echo "Production reset completed. Backup retained at $BACKUP_DIR"
