name: CI/CD

# Runs validation for pull requests and can publish/deploy production images.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      production_domain:
        description: "Production domain without https://. Overrides the PRODUCTION_DOMAIN repository variable."
        required: false
        type: string
      deploy:
        description: "Deploy the latest published images to the production server."
        required: false
        default: false
        type: boolean
      deploy_ref:
        description: "Git ref for deploy/deploy.sh to pull on the server."
        required: false
        default: main
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  NEXT_PUBLIC_API_URL: http://localhost:4000

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: project
          POSTGRES_PASSWORD: project123
          POSTGRES_DB: me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U project -d me"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Test
        working-directory: backend
        env:
          NODE_ENV: test
          SECRET_KEY: test-secret
          DATABASE_URL: postgres://project:project123@localhost:5432/me
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
        run: npm test

      - name: Build
        working-directory: backend
        run: npm run build

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
        run: npm run build

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate backend image build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: sportstathub-backend:ci

      - name: Validate frontend image build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          tags: sportstathub-frontend:ci

      - name: Validate AI service image build
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: false
          tags: sportstathub-ai-service:ci

      - name: Validate OddSwitch API image build
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.api
          push: false
          tags: sportstathub-oddswitch-api:ci

      - name: Validate OddSwitch worker image build
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.worker
          push: false
          tags: sportstathub-oddswitch-worker:ci

      - name: Validate OddSwitch browser worker image build
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.browser
          push: false
          tags: sportstathub-oddswitch-browser-worker:ci

  publish:
    name: Publish Images
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    outputs:
      image_namespace: ${{ steps.image.outputs.image_namespace }}
      production_domain: ${{ steps.domain.outputs.production_domain }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image namespace
        id: image
        run: echo "image_namespace=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve production domain
        id: domain
        env:
          INPUT_DOMAIN: ${{ inputs.production_domain }}
          VARIABLE_DOMAIN: ${{ vars.PRODUCTION_DOMAIN }}
        run: |
          DOMAIN="${INPUT_DOMAIN:-$VARIABLE_DOMAIN}"
          if [ -z "$DOMAIN" ]; then
            echo "PRODUCTION_DOMAIN repository variable or workflow input is required for production image builds." >&2
            exit 1
          fi
          echo "production_domain=$DOMAIN" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/backend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/backend:latest

      - name: Publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ steps.domain.outputs.production_domain }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/frontend:latest

      - name: Publish AI service image
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/ai-service:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/ai-service:latest

      - name: Publish OddSwitch API image
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-api:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-api:latest

      - name: Publish OddSwitch worker image
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-worker:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-worker:latest

      - name: Publish OddSwitch browser worker image
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.browser
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-browser-worker:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-browser-worker:latest

  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'workflow_dispatch' && inputs.deploy
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          APP_DIR: ${{ secrets.PRODUCTION_APP_DIR || '/var/www/project' }}
          DEPLOY_REF: ${{ inputs.deploy_ref || 'main' }}
          DEPLOY_MODE: pull
          IMAGE_REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAMESPACE: ${{ needs.publish.outputs.image_namespace }}
          IMAGE_TAG: latest
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          envs: APP_DIR,DEPLOY_REF,DEPLOY_MODE,IMAGE_REGISTRY,IMAGE_NAMESPACE,IMAGE_TAG,GHCR_USER,GHCR_TOKEN
          script: |
            cd "$APP_DIR"
            echo "$GHCR_TOKEN" | docker login "$IMAGE_REGISTRY" -u "$GHCR_USER" --password-stdin
            bash deploy/deploy.sh
