name: CI/CD

# Runs validation for pull requests and deploys production images from main.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      production_domain:
        description: "Production domain without https://. Overrides the PRODUCTION_DOMAIN repository variable."
        required: false
        type: string
      deploy:
        description: "Deploy the latest published images to the production server on manual runs."
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  NEXT_PUBLIC_API_URL: http://localhost:4000

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: project
          POSTGRES_PASSWORD: project123
          POSTGRES_DB: me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U project -d me"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Apply and validate migrations
        working-directory: backend
        env:
          DATABASE_URL: postgres://project:project123@localhost:5432/me
        run: npm run migrate

      - name: Audit production dependencies
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high

      - name: Test
        working-directory: backend
        env:
          NODE_ENV: test
          SECRET_KEY: test-secret
          DATABASE_URL: postgres://project:project123@localhost:5432/me
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
        run: npm test

      - name: Build
        working-directory: backend
        run: npm run build

      # Start the built server (connected to CI Postgres + Redis), fetch /openapi.json,
      # then kill the server. The spec is uploaded as an artifact so the frontend job
      # can generate typed API client code without re-running the backend.
      - name: Generate OpenAPI spec
        working-directory: backend
        env:
          NODE_ENV: test
          SECRET_KEY: test-secret
          DATABASE_URL: postgres://project:project123@localhost:5432/me
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
        run: |
          node dist/server.js &
          SERVER_PID=$!
          for i in $(seq 1 20); do
            curl -sf http://localhost:4000/health && break || sleep 1
          done
          curl -sf http://localhost:4000/openapi.json -o openapi.json
          kill "$SERVER_PID" 2>/dev/null || true

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: backend/openapi.json
          retention-days: 1

  # Frontend runs after backend so it can download the OpenAPI spec and generate
  # typed API client code before the build. The ~2 min extra wait is worth having
  # types that always match the actual API.
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Download OpenAPI spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: frontend

      - name: Generate API types
        working-directory: frontend
        run: npx openapi-typescript openapi.json -o src/lib/api-types.ts

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Audit production dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
        run: npm run build

  oddswitch:
    name: OddSwitch Python CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: oddswitch/requirements/dev.txt

      - name: Install dependencies
        working-directory: oddswitch
        run: pip install -r requirements/dev.txt

      - name: Lint
        working-directory: oddswitch
        run: ruff check app tests

      - name: Test
        working-directory: oddswitch
        run: pytest -q

  e2e:
    name: Browser E2E and accessibility
    runs-on: ubuntu-latest
    needs: [backend]
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: project, POSTGRES_PASSWORD: project123, POSTGRES_DB: me }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U project -d me" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - name: Install backend and frontend
        run: npm ci --prefix backend && npm ci --prefix frontend
      - name: Build and migrate backend
        env:
          DATABASE_URL: postgres://project:project123@localhost:5432/me
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          SECRET_KEY: test-secret
          NODE_ENV: test
        run: npm run migrate --prefix backend && npm run build --prefix backend
      - name: Build frontend
        run: |
          npm run build --prefix frontend
          cp -R frontend/public frontend/.next/standalone/public
          cp -R frontend/.next/static frontend/.next/standalone/.next/static
      - name: Install Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Start application and run browser tests
        env:
          DATABASE_URL: postgres://project:project123@localhost:5432/me
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          SECRET_KEY: test-secret
          NODE_ENV: test
          CI: "true"
        run: |
          node backend/dist/server.js &
          HOSTNAME=0.0.0.0 PORT=3000 node frontend/.next/standalone/server.js &
          for i in $(seq 1 30); do curl -sf -o /dev/null http://localhost:4000/health/ready && curl -sf -o /dev/null http://localhost:3000 && break || sleep 1; done
          npm run test:e2e --prefix frontend

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - oddswitch
      - e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate backend image build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: sportstathub-backend:ci

      - name: Validate frontend image build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          tags: sportstathub-frontend:ci

      - name: Validate OddSwitch API image build
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.api
          push: false
          load: true
          tags: sportstathub-oddswitch-api:ci

      - name: Validate OddSwitch worker image build
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.worker
          push: false
          load: true
          tags: sportstathub-oddswitch-worker:ci

      - name: Validate OddSwitch browser worker image build
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.browser
          push: false
          load: true
          tags: sportstathub-oddswitch-browser-worker:ci

      - name: Scan backend image for vulnerable dependencies
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: sportstathub-backend:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
      - name: Scan frontend image for vulnerable dependencies
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: sportstathub-frontend:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
      - name: Scan OddSwitch API image for vulnerable dependencies
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: sportstathub-oddswitch-api:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
      - name: Scan OddSwitch worker images for vulnerable dependencies
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: sportstathub-oddswitch-worker:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
      - name: Scan OddSwitch browser image for vulnerable dependencies
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: sportstathub-oddswitch-browser-worker:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

  publish:
    name: Publish Images
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    outputs:
      image_namespace: ${{ steps.image.outputs.image_namespace }}
      production_domain: ${{ steps.domain.outputs.production_domain }}
      frontend_api_url: ${{ steps.domain.outputs.frontend_api_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image namespace
        id: image
        run: echo "image_namespace=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve frontend API URL
        id: domain
        env:
          INPUT_DOMAIN: ${{ inputs.production_domain }}
          VARIABLE_DOMAIN: ${{ vars.PRODUCTION_DOMAIN }}
          SECRET_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
          FALLBACK_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          DEPLOY_REQUESTED: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy) }}
        run: |
          DOMAIN="${INPUT_DOMAIN:-${VARIABLE_DOMAIN:-$SECRET_DOMAIN}}"
          if [ -n "$DOMAIN" ]; then
            API_URL="$DOMAIN"
            case "$API_URL" in
              http://*|https://*) ;;
              *) API_URL="https://$API_URL" ;;
            esac
          elif [ "$DEPLOY_REQUESTED" = "true" ]; then
            echo "PRODUCTION_DOMAIN repository variable, repository secret, or workflow input is required for production deploys." >&2
            exit 1
          else
            API_URL="$FALLBACK_API_URL"
          fi
          echo "production_domain=$DOMAIN" >> "$GITHUB_OUTPUT"
          echo "frontend_api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/backend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/backend:latest

      - name: Publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.domain.outputs.frontend_api_url }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/frontend:latest

      - name: Publish OddSwitch API image
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-api:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-api:latest

      - name: Publish OddSwitch worker image
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-worker:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-worker:latest

      - name: Publish OddSwitch browser worker image
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.browser
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-browser-worker:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-browser-worker:latest

  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f # v1.2.2
        env:
          APP_DIR: ${{ secrets.PRODUCTION_APP_DIR || '/var/www/project' }}
          REPO: ${{ github.repository }}
          IMAGE_REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAMESPACE: ${{ needs.publish.outputs.image_namespace }}
          # Pin to the exact commit's images (publish builds both :sha and :latest).
          # Deploying :latest makes "which version is live" ambiguous and is what
          # caused the version drift on the box.
          IMAGE_TAG: ${{ github.sha }}
          DEPLOY_DOMAIN: ${{ needs.publish.outputs.production_domain }}
          DEPLOY_ACME_EMAIL: ${{ secrets.ACME_EMAIL || vars.ACME_EMAIL }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          # App secrets — written to .env on the server at deploy time.
          # Add or update values in GitHub → Settings → Secrets and variables → Actions.
          APP_PORT: ${{ secrets.PORT || '4000' }}
          APP_HOST: ${{ secrets.HOST || '0.0.0.0' }}
          APP_LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'warn' }}
          APP_SECRET_KEY: ${{ secrets.SECRET_KEY }}
          APP_JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION || '3600' }}
          APP_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          APP_REDIS_HOST: ${{ secrets.REDIS_HOST || 'redis' }}
          APP_REDIS_PORT: ${{ secrets.REDIS_PORT || '6379' }}
          APP_REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          APP_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          APP_GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          APP_GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          APP_FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          APP_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          APP_SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
          APP_NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          APP_NVIDIA_MODEL: ${{ secrets.NVIDIA_MODEL || 'nvidia/nemotron-3-super-120b-a12b' }}
          APP_MFA_ENCRYPTION_KEY: ${{ secrets.MFA_ENCRYPTION_KEY }}
          APP_REQUIRE_OTP: ${{ secrets.REQUIRE_OTP || 'true' }}
          APP_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          APP_EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          APP_EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME || 'SportStatHub' }}
          APP_CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          APP_PAYSTACK_PUBLIC_KEY: ${{ secrets.PAYSTACK_PUBLIC_KEY }}
          APP_PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          APP_PAYSTACK_CALLBACK_URL: ${{ secrets.PAYSTACK_CALLBACK_URL }}
          APP_ODDSWITCH_URL: ${{ secrets.ODDSWITCH_URL || 'http://oddswitch-api:8001' }}
          APP_ODDSWITCH_API_KEY: ${{ secrets.ODDSWITCH_API_KEY }}
          APP_ODDSWITCH_WEBHOOK_SIGNING_SECRET: ${{ secrets.ODDSWITCH_WEBHOOK_SIGNING_SECRET }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
          username: ${{ secrets.PRODUCTION_USER }}
          password: ${{ secrets.PRODUCTION_PASSWORD }}
          fingerprint: ${{ secrets.PRODUCTION_HOST_FINGERPRINT }}
          # Single unbroken line — deliberately NOT a YAML folded block (`>-`).
          # Folded scalars join line breaks with a space, so a multi-line list here
          # silently produced " APP_DB_PASSWORD", " APP_DATABASE_URL", etc. (leading
          # space on every line-continuation token). appleboy/ssh-action does an
          # exact-name lookup, so those space-prefixed entries never resolved and
          # every deploy failed on "DB_PASSWORD is empty" even once the secrets existed.
          envs: APP_DIR,REPO,IMAGE_REGISTRY,IMAGE_NAMESPACE,IMAGE_TAG,DEPLOY_DOMAIN,DEPLOY_ACME_EMAIL,GHCR_USER,GHCR_TOKEN,APP_PORT,APP_HOST,APP_LOG_LEVEL,APP_SECRET_KEY,APP_JWT_EXPIRATION,APP_DATABASE_URL,APP_CORS_ORIGIN,APP_REDIS_HOST,APP_REDIS_PORT,APP_REDIS_PASSWORD,APP_GOOGLE_CLIENT_ID,APP_GOOGLE_CLIENT_SECRET,APP_GOOGLE_REDIRECT_URI,APP_DB_PASSWORD,APP_FOOTBALL_API_KEY,APP_ODDS_API_KEY,APP_SPORTS_API_KEY,APP_NVIDIA_API_KEY,APP_NVIDIA_MODEL,APP_MFA_ENCRYPTION_KEY,APP_REQUIRE_OTP,APP_RESEND_API_KEY,APP_EMAIL_FROM,APP_EMAIL_FROM_NAME,APP_CONTACT_EMAIL,APP_PAYSTACK_PUBLIC_KEY,APP_PAYSTACK_SECRET_KEY,APP_PAYSTACK_CALLBACK_URL,APP_ODDSWITCH_URL,APP_ODDSWITCH_API_KEY,APP_ODDSWITCH_WEBHOOK_SIGNING_SECRET
          script: |
            set -euo pipefail
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # Fetch the EXACT compose file for this commit straight from GitHub.
            # The server holds NO git checkout and NO source — only this compose
            # plus the secrets in .env. That kills the drift that caused the mess.
            curl -fsSL \
              -H "Authorization: Bearer $GHCR_TOKEN" \
              -H "Accept: application/vnd.github.raw" \
              "https://api.github.com/repos/$REPO/contents/docker-compose.prod.yml?ref=$IMAGE_TAG" \
              -o docker-compose.prod.yml

            echo "$GHCR_TOKEN" | docker login "$IMAGE_REGISTRY" -u "$GHCR_USER" --password-stdin

            # Single source of truth for the DB password. compose interpolates
            # ${DB_PASSWORD} into every Postgres connection string (backend + oddswitch),
            # so it must be non-empty and consistent. If no standalone DB_PASSWORD secret
            # was supplied, parse it out of DATABASE_URL (postgres://user:PASSWORD@host/db).
            APP_DB_PASSWORD="${APP_DB_PASSWORD:-}"
            if [ -z "$APP_DB_PASSWORD" ] && [ -n "${APP_DATABASE_URL:-}" ]; then
              APP_DB_PASSWORD="$(printf '%s' "$APP_DATABASE_URL" | sed -E 's#^[a-zA-Z+]+://[^:]+:([^@]*)@.*#\1#')"
            fi
            if [ -z "$APP_DB_PASSWORD" ]; then
              echo "ERROR: DB_PASSWORD is empty — set the DB_PASSWORD secret or include the password in DATABASE_URL." >&2
              exit 1
            fi

            # Fail fast on other secrets that have no safe default: an empty SECRET_KEY
            # crashes the backend container outright (JWT signing key is required), and
            # an empty DOMAIN silently breaks CORS/OAuth-callback/email-from URLs since
            # compose builds those by interpolating ${DOMAIN} directly.
            if [ -z "${APP_SECRET_KEY:-}" ]; then
              echo "ERROR: SECRET_KEY is empty — set the SECRET_KEY repository secret." >&2
              exit 1
            fi
            if [ -z "${DEPLOY_DOMAIN:-}" ]; then
              echo "ERROR: DEPLOY_DOMAIN is empty — set the PRODUCTION_DOMAIN repository secret or variable." >&2
              exit 1
            fi
            if [ -z "${APP_RESEND_API_KEY:-}" ]; then
              echo "ERROR: RESEND_API_KEY is empty — account verification and recovery require Resend." >&2
              exit 1
            fi

            # Write .env from GitHub Secrets — the server no longer needs a manually
            # maintained env file. All values flow through GitHub → CI → here.
            {
              printf 'PORT=%s\n'                  "${APP_PORT}"
              printf 'HOST=%s\n'                  "${APP_HOST}"
              printf 'LOG_LEVEL=%s\n'             "${APP_LOG_LEVEL}"
              printf 'SECRET_KEY=%s\n'            "${APP_SECRET_KEY}"
              printf 'JWT_EXPIRATION=%s\n'        "${APP_JWT_EXPIRATION}"
              printf 'DATABASE_URL=%s\n'          "${APP_DATABASE_URL}"
              printf 'CORS_ORIGIN=%s\n'           "${APP_CORS_ORIGIN}"
              printf 'REDIS_HOST=%s\n'            "${APP_REDIS_HOST}"
              printf 'REDIS_PORT=%s\n'            "${APP_REDIS_PORT}"
              printf 'REDIS_PASSWORD=%s\n'        "${APP_REDIS_PASSWORD}"
              printf 'GOOGLE_CLIENT_ID=%s\n'      "${APP_GOOGLE_CLIENT_ID}"
              printf 'GOOGLE_CLIENT_SECRET=%s\n'  "${APP_GOOGLE_CLIENT_SECRET}"
              printf 'GOOGLE_REDIRECT_URI=%s\n'   "${APP_GOOGLE_REDIRECT_URI}"
              printf 'DB_PASSWORD=%s\n'            "${APP_DB_PASSWORD}"
              printf 'FOOTBALL_API_KEY=%s\n'      "${APP_FOOTBALL_API_KEY}"
              printf 'SPORTS_API_KEY=%s\n'        "${APP_SPORTS_API_KEY}"
              printf 'ODDS_API_KEY=%s\n'          "${APP_ODDS_API_KEY}"
              printf 'NVIDIA_API_KEY=%s\n'        "${APP_NVIDIA_API_KEY}"
              printf 'NVIDIA_MODEL=%s\n'          "${APP_NVIDIA_MODEL}"
              printf 'MFA_ENCRYPTION_KEY=%s\n'    "${APP_MFA_ENCRYPTION_KEY}"
              printf 'REQUIRE_OTP=%s\n'           "${APP_REQUIRE_OTP}"
              printf 'RESEND_API_KEY=%s\n'        "${APP_RESEND_API_KEY}"
              printf 'EMAIL_FROM=%s\n'            "${APP_EMAIL_FROM}"
              printf 'EMAIL_FROM_NAME=%s\n'       "${APP_EMAIL_FROM_NAME}"
              printf 'CONTACT_EMAIL=%s\n'         "${APP_CONTACT_EMAIL}"
              printf 'PAYSTACK_PUBLIC_KEY=%s\n'   "${APP_PAYSTACK_PUBLIC_KEY}"
              printf 'PAYSTACK_SECRET_KEY=%s\n'   "${APP_PAYSTACK_SECRET_KEY}"
              printf 'PAYSTACK_CALLBACK_URL=%s\n' "${APP_PAYSTACK_CALLBACK_URL}"
              printf 'ODDSWITCH_URL=%s\n'         "${APP_ODDSWITCH_URL}"
              printf 'ODDSWITCH_API_KEY=%s\n'     "${APP_ODDSWITCH_API_KEY}"
              printf 'ODDSWITCH_WEBHOOK_SIGNING_SECRET=%s\n' "${APP_ODDSWITCH_WEBHOOK_SIGNING_SECRET}"
            } > .env
            chmod 600 .env
            DB_PASSWORD="$APP_DB_PASSWORD"

            export IMAGE_REGISTRY IMAGE_NAMESPACE IMAGE_TAG
            export DOMAIN="${DEPLOY_DOMAIN:-${DOMAIN:-}}"
            export ACME_EMAIL="${DEPLOY_ACME_EMAIL:-${ACME_EMAIL:-}}"

            # Releases are immutable and can be pulled from GHCR again, so reclaim
            # stopped containers, unused images, and builder cache before touching
            # PostgreSQL. Never prune volumes: they contain PostgreSQL and Redis data.
            # This must precede the DB readiness check so Postgres can recover after
            # a host-level disk-full condition.
            docker container prune -f
            docker image prune -af
            docker builder prune -af
            docker system df

            docker network inspect web >/dev/null 2>&1 || docker network create web

            # Sync the Postgres user password to match DB_PASSWORD on every deploy.
            # POSTGRES_PASSWORD only applies on first-init; if the volume already exists
            # (initialized with a different/blank password), psql auth fails (exit 2).
            # Local socket connections inside the container use trust auth, so this ALTER
            # needs no password. Runs against the still-running db from the previous deploy.
            DB_CONTAINER="$(docker compose -f docker-compose.prod.yml ps -q db 2>/dev/null || true)"
            if [ -n "$DB_CONTAINER" ]; then
              DB_READY=false
              for attempt in $(seq 1 60); do
                if docker exec "$DB_CONTAINER" pg_isready -U project -d postgres >/dev/null 2>&1; then
                  DB_READY=true
                  break
                fi
                sleep 2
              done
              if [ "$DB_READY" != "true" ]; then
                echo "ERROR: PostgreSQL did not become ready after disk cleanup and recovery wait." >&2
                docker logs --tail=120 "$DB_CONTAINER"
                exit 1
              fi
              if printf '%s\n' "SELECT format('ALTER ROLE project PASSWORD %L', :'db_password') \\gexec" | \
                   docker exec -i "$DB_CONTAINER" psql -U project -d postgres \
                     --set=db_password="$DB_PASSWORD" --set=ON_ERROR_STOP=1; then
                echo "DB password synced to DB_PASSWORD."
              else
                echo "ERROR: failed to sync Postgres password — aborting before downstream auth failures." >&2
                exit 1
              fi
            fi
            AVAILABLE_SERVICES="$(docker compose -f docker-compose.prod.yml config --services)"
            DEPLOY_SERVICES=""
            for service in traefik backend frontend oddswitch-api oddswitch-worker oddswitch-browser-worker; do
              if printf '%s\n' "$AVAILABLE_SERVICES" | grep -qx "$service"; then
                DEPLOY_SERVICES="$DEPLOY_SERVICES $service"
              fi
            done

            docker compose -f docker-compose.prod.yml pull $DEPLOY_SERVICES
            docker compose -f docker-compose.prod.yml up -d --remove-orphans $DEPLOY_SERVICES || {
              docker compose -f docker-compose.prod.yml ps
              docker compose -f docker-compose.prod.yml logs --tail=120 $DEPLOY_SERVICES
              exit 1
            }

            docker compose -f docker-compose.prod.yml ps
            for service in $DEPLOY_SERVICES; do
              container_id="$(docker compose -f docker-compose.prod.yml ps -q "$service")"
              [ -n "$container_id" ] || continue
              status=""
              for attempt in $(seq 1 30); do
                status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")"
                if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
                  break
                fi
                sleep 2
              done
              if [ "$status" != "healthy" ] && [ "$status" != "running" ]; then
                docker compose -f docker-compose.prod.yml logs --tail=80 "$service"
                exit 1
              fi
            done
