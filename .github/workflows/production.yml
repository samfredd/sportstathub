name: CI/CD

# Runs validation for pull requests and deploys production images from main.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      production_domain:
        description: "Production domain without https://. Overrides the PRODUCTION_DOMAIN repository variable."
        required: false
        type: string
      deploy:
        description: "Deploy the latest published images to the production server on manual runs."
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  NEXT_PUBLIC_API_URL: http://localhost:4000

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: project
          POSTGRES_PASSWORD: project123
          POSTGRES_DB: me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U project -d me"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Test
        working-directory: backend
        env:
          NODE_ENV: test
          SECRET_KEY: test-secret
          DATABASE_URL: postgres://project:project123@localhost:5432/me
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
        run: npm test

      - name: Build
        working-directory: backend
        run: npm run build

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
        run: npm run build

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate backend image build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: sportstathub-backend:ci

      - name: Validate frontend image build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          tags: sportstathub-frontend:ci

      - name: Validate AI service image build
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: false
          tags: sportstathub-ai-service:ci

      - name: Validate OddSwitch API image build
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.api
          push: false
          tags: sportstathub-oddswitch-api:ci

      - name: Validate OddSwitch worker image build
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.worker
          push: false
          tags: sportstathub-oddswitch-worker:ci

      - name: Validate OddSwitch browser worker image build
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.browser
          push: false
          tags: sportstathub-oddswitch-browser-worker:ci

  publish:
    name: Publish Images
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    outputs:
      image_namespace: ${{ steps.image.outputs.image_namespace }}
      production_domain: ${{ steps.domain.outputs.production_domain }}
      frontend_api_url: ${{ steps.domain.outputs.frontend_api_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image namespace
        id: image
        run: echo "image_namespace=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve frontend API URL
        id: domain
        env:
          INPUT_DOMAIN: ${{ inputs.production_domain }}
          VARIABLE_DOMAIN: ${{ vars.PRODUCTION_DOMAIN }}
          FALLBACK_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          DEPLOY_REQUESTED: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy) }}
        run: |
          DOMAIN="${INPUT_DOMAIN:-$VARIABLE_DOMAIN}"
          if [ -n "$DOMAIN" ]; then
            API_URL="$DOMAIN"
            case "$API_URL" in
              http://*|https://*) ;;
              *) API_URL="https://$API_URL" ;;
            esac
          elif [ "$DEPLOY_REQUESTED" = "true" ]; then
            echo "PRODUCTION_DOMAIN repository variable or workflow input is required when deploy=true." >&2
            exit 1
          else
            API_URL="$FALLBACK_API_URL"
          fi
          echo "production_domain=$DOMAIN" >> "$GITHUB_OUTPUT"
          echo "frontend_api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/backend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/backend:latest

      - name: Publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.domain.outputs.frontend_api_url }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/frontend:latest

      - name: Publish AI service image
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/ai-service:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/ai-service:latest

      - name: Publish OddSwitch API image
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-api:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-api:latest

      - name: Publish OddSwitch worker image
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-worker:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-worker:latest

      - name: Publish OddSwitch browser worker image
        uses: docker/build-push-action@v6
        with:
          context: ./oddswitch
          file: ./oddswitch/Dockerfile.browser
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-browser-worker:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/oddswitch-browser-worker:latest

  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          APP_DIR: ${{ secrets.PRODUCTION_APP_DIR || '/var/www/project' }}
          REPO: ${{ github.repository }}
          IMAGE_REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAMESPACE: ${{ needs.publish.outputs.image_namespace }}
          # Pin to the exact commit's images (publish builds both :sha and :latest).
          # Deploying :latest makes "which version is live" ambiguous and is what
          # caused the version drift on the box.
          IMAGE_TAG: ${{ github.sha }}
          DEPLOY_DOMAIN: ${{ needs.publish.outputs.production_domain }}
          DEPLOY_ACME_EMAIL: ${{ secrets.ACME_EMAIL || vars.ACME_EMAIL }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          password: ${{ secrets.PRODUCTION_PASSWORD }}
          envs: APP_DIR,REPO,IMAGE_REGISTRY,IMAGE_NAMESPACE,IMAGE_TAG,DEPLOY_DOMAIN,DEPLOY_ACME_EMAIL,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # Fetch the EXACT compose file for this commit straight from GitHub.
            # The server holds NO git checkout and NO source — only this compose
            # plus the secrets in .env. That kills the drift that caused the mess.
            curl -fsSL \
              -H "Authorization: Bearer $GHCR_TOKEN" \
              -H "Accept: application/vnd.github.raw" \
              "https://api.github.com/repos/$REPO/contents/docker-compose.prod.yml?ref=$IMAGE_TAG" \
              -o docker-compose.prod.yml

            echo "$GHCR_TOKEN" | docker login "$IMAGE_REGISTRY" -u "$GHCR_USER" --password-stdin

            # Secrets live ONLY on the server, never shipped through CI. Fail fast
            # with a clear message rather than a cryptic boot crash if it's absent.
            if [ ! -f .env ]; then
              echo "ERROR: $APP_DIR/.env is missing — create it on the server before deploying." >&2
              exit 1
            fi
            set -a; . ./.env; set +a

            export IMAGE_REGISTRY IMAGE_NAMESPACE IMAGE_TAG
            export DOMAIN="${DEPLOY_DOMAIN:-${DOMAIN:-}}"
            export ACME_EMAIL="${DEPLOY_ACME_EMAIL:-${ACME_EMAIL:-}}"

            docker network inspect web >/dev/null 2>&1 || docker network create web
            AVAILABLE_SERVICES="$(docker compose -f docker-compose.prod.yml config --services)"
            DEPLOY_SERVICES=""
            for service in traefik backend frontend ai-service oddswitch-api oddswitch-worker oddswitch-browser-worker; do
              if printf '%s\n' "$AVAILABLE_SERVICES" | grep -qx "$service"; then
                DEPLOY_SERVICES="$DEPLOY_SERVICES $service"
              fi
            done
            docker compose -f docker-compose.prod.yml pull $DEPLOY_SERVICES
            docker compose -f docker-compose.prod.yml up -d --remove-orphans $DEPLOY_SERVICES || {
              docker compose -f docker-compose.prod.yml ps
              docker compose -f docker-compose.prod.yml logs --tail=120 $DEPLOY_SERVICES
              exit 1
            }

            docker compose -f docker-compose.prod.yml ps
            for service in $DEPLOY_SERVICES; do
              container_id="$(docker compose -f docker-compose.prod.yml ps -q "$service")"
              [ -n "$container_id" ] || continue
              status=""
              for attempt in $(seq 1 30); do
                status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")"
                if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
                  break
                fi
                sleep 2
              done
              if [ "$status" != "healthy" ] && [ "$status" != "running" ]; then
                docker compose -f docker-compose.prod.yml logs --tail=80 "$service"
                exit 1
              fi
            done
