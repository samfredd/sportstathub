services:

  # ── Traefik reverse proxy + automatic SSL ─────────────────────────────────
  traefik:
    image: traefik:v3
    restart: always
    command:
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=web"
      # Let's Encrypt
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      # Logs
      - "--log.level=WARN"
      - "--accesslog=false"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    networks:
      - web

  # ── Ollama — CPU-only LLM inference ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      # Keep memory footprint low on 4 GB VPS
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    volumes:
      - ollama_data:/root/.ollama
    # Port exposed only to the host for debugging; backend uses internal DNS
    ports:
      - "127.0.0.1:11434:11434"
    networks:
      - web       # needed for outbound internet (model pulls)
      - internal  # backend reaches ollama via http://ollama:11434
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── Fastify backend ───────────────────────────────────────────────────────
  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-sportstathub}/backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT:                  "4000"
      HOST:                  "0.0.0.0"
      NODE_ENV:              "production"
      LOG_LEVEL:             "warn"
      DATABASE_URL:          "postgres://project:${DB_PASSWORD}@db:5432/me"
      REDIS_HOST:            "redis"
      REDIS_PORT:            "6379"
      REDIS_PASSWORD:        "${REDIS_PASSWORD}"
      SECRET_KEY:            "${SECRET_KEY}"
      JWT_EXPIRATION:        "3600"
      CORS_ORIGIN:           "https://${DOMAIN}"
      FOOTBALL_API_KEY:      "${FOOTBALL_API_KEY:-}"
      SPORTS_API_KEY:        "${SPORTS_API_KEY:-}"
      ODDS_API_KEY:          "${ODDS_API_KEY:-}"
      GOOGLE_CLIENT_ID:      "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET:  "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URI:   "https://${DOMAIN}/auth/google/callback"
      ADMIN_INVITE_KEY:      "${ADMIN_INVITE_KEY}"
      REQUIRE_OTP:           "${REQUIRE_OTP:-true}"
      PAYSTACK_PUBLIC_KEY:    "${PAYSTACK_PUBLIC_KEY:-}"
      PAYSTACK_SECRET_KEY:    "${PAYSTACK_SECRET_KEY:-}"
      PAYSTACK_CALLBACK_URL:  "https://${DOMAIN}/dashboard/subscription"
      ODDSWITCH_URL:         "http://localhost:8001"
      SMTP_HOST:             "${SMTP_HOST:-}"
      SMTP_PORT:             "${SMTP_PORT:-587}"
      SMTP_SECURE:           "${SMTP_SECURE:-false}"
      SMTP_USER:             "${SMTP_USER:-}"
      SMTP_PASS:             "${SMTP_PASS:-}"
      EMAIL_FROM:            "no-reply@${DOMAIN}"
      EMAIL_FROM_NAME:       "SportStatHub"
      OLLAMA_BASE_URL:       "http://ollama:11434"
      OLLAMA_MODEL:          "${OLLAMA_MODEL:-qwen2.5:0.5b}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - web
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      # Route /api /auth /health → backend
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || Path(`/health`) || (PathPrefix(`/auth`) && (Method(`POST`) || PathPrefix(`/auth/google`))))"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=le"
      - "traefik.http.services.backend.loadbalancer.server.port=4000"

  # ── Next.js frontend ──────────────────────────────────────────────────────
  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-sportstathub}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://${DOMAIN}"
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      # Route everything else → frontend
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      # Redirect www → non-www
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.${DOMAIN}/(.*)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://${DOMAIN}/$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.frontend.middlewares=www-redirect"

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER:     project
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB:       me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass "${REDIS_PASSWORD}" --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  web:
    external: true   # created once: docker network create web
  internal:
    internal: true   # no external access

volumes:
  postgres_data:
  redis_data:
  traefik_certs:
  ollama_data:
