services:
  # 1. PostgreSQL Database
  database:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: project
      POSTGRES_PASSWORD: project123
      POSTGRES_DB: me
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project -d me"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Redis Cache
  redis-db:
    image: redis:7-alpine
    restart: always
    # We pass the password from the .env file to the redis-server command
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      # We must provide the password to the healthcheck as well
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Your Fastify App (Uncomment when running fully in Docker)
  # backend:
  #   build: .
  #   ports:
  #     - "4000:4000"
  #   environment:
  #     DATABASE_URL: postgres://project:project123@db:5432/me
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #     REDIS_PASSWORD: ${REDIS_PASSWORD}
  #     PORT: 4000
  #     HOST: 0.0.0.0
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  pgdata:
  redisdata:
